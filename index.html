<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Star-D AI 獲利中控台</title>
    
    <!-- 【修正點】必須使用正確的 .css 與 .js 檔案路徑 -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <py-config>
        packages = ["yfinance", "pandas"]
    </py-config>

    <style>
        :root { --gold: #ffd700; --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #334155; padding: 20px; border-radius: 15px; }
        .card h2 { color: var(--gold); font-size: 1.1rem; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #0f172a; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        #log-area { background: #000; color: #10b981; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; height: 200px; overflow-y: auto; border: 1px solid #334155; white-space: pre-wrap; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <h1>💰 Star-D AI 獲利中控台</h1>
    <div style="text-align: right;"><span id="status-tag" style="color: #facc15;">● Python 載入中...</span></div>
</div>

<div class="grid">
    <div class="card">
        <h2>📈 即時股市 AI 數據</h2>
        <input type="text" id="stock-id" value="NVDA">
        <button id="btn-stock" py-click="analyze_stock">抓取數據並分析</button>
    </div>
    <div class="card">
        <h2>🎬 AI 短影音文案生成</h2>
        <input type="text" id="video-topic" placeholder="輸入影片主題...">
        <button id="btn-video" py-click="generate_script">生成 60 秒腳本</button>
    </div>
    <div class="card">
        <h2>📊 複利收益模擬</h2>
        <input type="number" id="base-fund" value="1000">
        <button id="btn-calc" py-click="calc_compound">計算一年後預期</button>
    </div>
</div>

<div id="log-area">>> 系統初始化中... 首次運行需下載 yfinance 模組 (約 10-20 秒)，請稍候。</div>

<script type="py">
    import yfinance as yf
    from pyscript import document
    from datetime import datetime

    # 引擎啟動後切換燈號
    status_tag = document.querySelector("#status-tag")
    status_tag.innerText = "● Python 引擎已就緒"
    status_tag.style.color = "#10b981"

    def write_log(msg, color="white"):
        log_div = document.querySelector("#log-area")
        time_str = datetime.now().strftime("%H:%M:%S")
        log_div.innerHTML = f"<div style='color:{color}'>[{time_str}] {msg}</div>" + log_div.innerHTML

    async def analyze_stock(event):
        ticker = document.querySelector("#stock-id").value.upper()
        write_log(f"正在抓取 {ticker} 即時數據...", "#38bdf8")
        try:
            s = yf.Ticker(ticker)
            d = s.history(period="1d")
            if d.empty:
                write_log(f"❌ 找不到代碼 {ticker}", "#e94560")
            else:
                price = d['Close'].iloc[-1]
                write_log(f"✅ {ticker} 當前股價: ${price:.2f}", "#ffd700")
                write_log(f"🤖 AI 建議：{'強勢看漲' if price > 100 else '建議觀望'}")
        except Exception as e:
            write_log(f"發生錯誤: {str(e)}", "#e94560")

    def generate_script(event):
        topic = document.querySelector("#video-topic").value
        if not topic:
            write_log("❌ 請輸入主題", "#e94560")
            return
        write_log(f"🧠 AI 正在構思『{topic}』腳本...", "#38bdf8")
        write_log(f"【腳本】開場：你絕對想不到 {topic} 的秘密...", "#34d399")

    def calc_compound(event):
        fund = float(document.querySelector("#base-fund").value)
        final = fund * (1.1 ** 12)
        write_log(f"📈 模擬 12 個月後預計：${final:,.2f}", "#ffd700")
</script>

</body>
</html>
